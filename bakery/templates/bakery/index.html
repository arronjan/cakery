<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>
      Cherry Michelle's Cakes & Pastries - Custom Cakes | Artisanal Cakery
    </title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --frosting-white: #ffffff;
        --strawberry-pink: #fce4ec;
        --velvet-maroon: #880e4f;
        --cream-beige: #fff9f0;
      }
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background-color: var(--cream-beige);
        color: #333;
      }
      nav {
        padding: 20px 50px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .hero {
        height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        background:
          linear-gradient(rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.3)),
          url("https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&q=80&w=1080");
        background-size: cover;
        background-position: center;
      }
      .hero-content {
        background: rgba(255, 255, 255, 0.85);
        padding: 40px;
        border-radius: 15px;
        backdrop-filter: blur(5px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      }
      h1 {
        font-family: "Playfair Display", serif;
        font-size: 3.5rem;
        color: var(--velvet-maroon);
        margin-bottom: 10px;
      }
      .cta-button {
        padding: 15px 35px;
        background-color: var(--velvet-maroon);
        color: white;
        text-decoration: none;
        border-radius: 30px;
        font-weight: bold;
        transition: 0.3s;
      }
      .cta-button:hover {
        transform: scale(1.05);
        background-color: #6a0b3d;
      }
    </style>
  </head>
  <body>
    <nav>
      <div
        style="
          font-family: &quot;Playfair Display&quot;;
          font-weight: bold;
          font-size: 1.5rem;
        "
      >
        Sweet Tiers
      </div>
      <div>
        <a
          href="#"
          style="margin-left: 20px; text-decoration: none; color: #333"
          >Menu</a
        >
      </div>
    </nav>
    <section class="hero">
      <div class="hero-content">
        <h1>
          Baked with Love, <br />
          Served with Joy.
        </h1>
        <p>Experience the finest artisanal cakes in the city.</p>
        <br />
        <a href="#" class="cta-button">Order a Custom Cake</a>
      </div>
    </section>
  </body>
</html>
